  <text x="102" y="136" fill="#7ED8C1" font-family="IBM Plex Mono" font-size="18" letter-spacing="0.16em">GITMORTEM</text>
  <text x="102" y="214" fill="#F4EFE6" font-family="Space Grotesk" font-size="56" font-weight="700" letter-spacing="-0.05em">Turn one commit</text>
  <text x="102" y="274" fill="#F4EFE6" font-family="Space Grotesk" font-size="56" font-weight="700" letter-spacing="-0.05em">into a report.</text>
  <text x="102" y="336" fill="#B8C0CB" font-family="Space Grotesk" font-size="23">Root cause, blast radius, timeline,</text>
  <text x="102" y="370" fill="#B8C0CB" font-family="Space Grotesk" font-size="23">and prevention in one command.</text>
