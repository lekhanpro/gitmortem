<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="640" fill="#F4EEE4"/>
  <rect width="1280" height="640" fill="url(#grain)" opacity="0.18"/>
  <circle cx="131" cy="98" r="190" fill="#EBCBBB"/>
  <circle cx="1138" cy="534" r="240" fill="#D9E6EC"/>
  <rect x="52" y="40" width="1176" height="560" rx="36" fill="#FBF8F2" stroke="#D9CBBB"/>

  <rect x="92" y="86" width="74" height="74" rx="22" fill="url(#brand)"/>
  <text x="129" y="133" text-anchor="middle" fill="#FFF8F2" font-family="Fraunces, Georgia, serif" font-size="28" font-weight="700">gm</text>
  <text x="192" y="122" fill="#1D1C1A" font-family="Manrope, Arial, sans-serif" font-size="34" font-weight="800">gitmortem</text>
  <text x="192" y="154" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="20" font-weight="600">Commit-to-postmortem incident reports</text>

  <text x="92" y="238" fill="#8F2F21" font-family="Manrope, Arial, sans-serif" font-size="16" font-weight="800" letter-spacing="3">PRODUCTION INCIDENT TOOLING</text>
  <text x="92" y="304" fill="#1D1C1A" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="700">From one bad hash</text>
  <text x="92" y="368" fill="#1D1C1A" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="700">to a report your team</text>
  <text x="92" y="432" fill="#1D1C1A" font-family="Fraunces, Georgia, serif" font-size="64" font-weight="700">can act on.</text>

  <text x="92" y="492" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="26" font-weight="600">
    Root cause, blast radius, timeline, severity, and prevention steps.
  </text>

  <rect x="760" y="114" width="388" height="178" rx="26" fill="#15212A"/>
  <rect x="760" y="114" width="388" height="42" rx="26" fill="#1E2B35"/>
  <circle cx="790" cy="135" r="7" fill="#F49372"/>
  <circle cx="814" cy="135" r="7" fill="#F0C36D"/>
  <circle cx="838" cy="135" r="7" fill="#81B7C6"/>
  <text x="866" y="141" fill="#EDF2F5" font-family="IBM Plex Mono, monospace" font-size="18">$ gitmortem 9af31c2d</text>
  <text x="790" y="188" fill="#90C0CB" font-family="IBM Plex Mono, monospace" font-size="16">SEVERITY</text>
  <text x="790" y="214" fill="#EDF2F5" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800">SEV2</text>
  <text x="790" y="252" fill="#90C0CB" font-family="IBM Plex Mono, monospace" font-size="16">ROOT CAUSE</text>
  <text x="790" y="278" fill="#EDF2F5" font-family="Manrope, Arial, sans-serif" font-size="19" font-weight="600">
    Provider fallback vanished during a config refactor.
  </text>

  <rect x="760" y="320" width="186" height="204" rx="26" fill="#EEF2F4" stroke="#C6D4DA"/>
  <text x="790" y="360" fill="#8F2F21" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">ROOT CAUSE</text>
  <text x="790" y="412" fill="#1D1C1A" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="700">Specific trigger.</text>
  <text x="790" y="448" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="600">Diff facts, timeline,</text>
  <text x="790" y="474" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="600">and explicit unknowns.</text>

  <rect x="962" y="320" width="186" height="204" rx="26" fill="#FFF6F2" stroke="#E7C7B7"/>
  <text x="992" y="360" fill="#8F2F21" font-family="Manrope, Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">NEVER AGAIN</text>
  <text x="992" y="412" fill="#1D1C1A" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="700">Actionable fixes.</text>
  <text x="992" y="448" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="600">Tests, tooling,</text>
  <text x="992" y="474" fill="#5B554D" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="600">monitoring, process.</text>

  <defs>
    <linearGradient id="brand" x1="92" y1="86" x2="166" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B84B33"/>
      <stop offset="1" stop-color="#8F2F21"/>
    </linearGradient>
    <pattern id="grain" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1" fill="#1D1C1A"/>
      <circle cx="17" cy="9" r="1" fill="#1D1C1A"/>
      <circle cx="10" cy="19" r="1" fill="#1D1C1A"/>
    </pattern>
  </defs>
